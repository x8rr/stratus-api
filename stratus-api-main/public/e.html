<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.65);
        }
        #ambient {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.7s ease;
            filter: blur(60px) saturate(160%);
            transform: scale(1.2);
            z-index: 1;
        }
        #ambient.visible { opacity: 0.6; }
        #stream-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        #stream {
            width: 96%;
            height: 96%;
            object-fit: contain;
            background: transparent;
            opacity: 0;
            transition: opacity 0.7s ease;
            display: block;
            border-radius: 8px;
        }
        #stream.visible { opacity: 1; }
        video::-webkit-media-controls { display: none !important; }
        #connecting-overlay {
            position: fixed;
            inset: 0;
            z-index: 30;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        #connecting-overlay.hidden { opacity: 0; }
        #connecting-badge {
            position: absolute;
            top: 22px;
            left: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #connecting-badge img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border-radius: 6px;
            flex-shrink: 0;
        }
        #connecting-badge .label {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #c8ff00;
            letter-spacing: -1px;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
        }
        .cdot {
            display: inline-block;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .cdot.on { opacity: 1; }
        #audio-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            z-index: 10;
            cursor: pointer;
        }
        #audio-overlay.visible { display: flex; }
        #audio-overlay span {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.6);
        }
        #ended-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        #ended-overlay.visible { display: flex; }
        #ended-overlay span {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.45);
        }
    </style>
</head>

            <div class="label">Connecting<span class="cdot" id="d1">.</span><span class="cdot" id="d2">.</span><span class="cdot" id="d3">.</span></div>
        </div>
    </div>
    <div id="audio-overlay"><span>Click to allow audio</span></div>
    <div id="ended-overlay"><span>Session ended</span></div>
    <script>
        const streamEl          = document.getElementById("stream");
        const ambientEl         = document.getElementById("ambient");
        const audioOverlay      = document.getElementById("audio-overlay");
        const endedOverlay      = document.getElementById("ended-overlay");
        const connectingOverlay = document.getElementById("connecting-overlay");
        const dots              = [document.getElementById("d1"), document.getElementById("d2"), document.getElementById("d3")];

        let dotTimers = [];
        function scheduleDots() {
            dotTimers.push(setTimeout(() => dots[0].classList.add("on"),    0));
            dotTimers.push(setTimeout(() => dots[1].classList.add("on"),  200));
            dotTimers.push(setTimeout(() => dots[2].classList.add("on"),  400));
            dotTimers.push(setTimeout(() => {
                dots.forEach(d => d.classList.remove("on"));
                dotTimers.push(setTimeout(scheduleDots, 500));
            }, 400 + 1000));
        }
        scheduleDots();

        function hideConnecting() {
            connectingOverlay.classList.add("hidden");
            dotTimers.forEach(clearTimeout);
            dotTimers = [];
            setTimeout(() => connectingOverlay.style.display = "none", 500);
        }

        const ambientCtx = ambientEl.getContext("2d", { alpha: false });
        ambientEl.width  = 128;
        ambientEl.height = 72;
        let ambientInterval = null;
        function startAmbient() {
            ambientEl.classList.add("visible");
            ambientInterval = setInterval(() => {
                if (streamEl.readyState >= 2) ambientCtx.drawImage(streamEl, 0, 0, 128, 72);
            }, 150);
        }
        function stopAmbient() {
            clearInterval(ambientInterval);
            ambientInterval = null;
            ambientEl.classList.remove("visible");
        }

        let pc   = null;
        let _dc  = null;
        let sigWs = null;
        function sigSend(obj) {
            if (sigWs && sigWs.readyState === WebSocket.OPEN) sigWs.send(JSON.stringify(obj));
        }
        async function setupWebRTC(iceServers, signaling_ws) {
            sigWs = new WebSocket(signaling_ws);
            sigWs.onmessage = async (e) => {
                let msg;
                try { msg = JSON.parse(e.data); } catch { return; }
                switch (msg.type) {
                    case "game_ready":
                        pc = new RTCPeerConnection({ iceServers });
                        pc.addTransceiver("audio", { direction: "recvonly" });
                        pc.addTransceiver("video", { direction: "recvonly" });
                        const dc = pc.createDataChannel("JYSDK", { id: 1, ordered: false, maxRetransmits: 0 });
                        dc.onopen = () => { _dc = dc; setupCursorHandling(dc); };
                        pc.ondatachannel = (ev) => { if (ev.channel.label === "JYSDK") _dc = ev.channel; };
                        pc.ontrack = (ev) => {
                            if (!streamEl.srcObject) streamEl.srcObject = new MediaStream();
                            streamEl.srcObject.addTrack(ev.track);
                        };
                        pc.onicecandidate = (ev) => {
                            if (ev.candidate) sigSend({ type: "rtc_candidate", candidate: ev.candidate.toJSON() });
                        };
                        pc.oniceconnectionstatechange = () => {
                            const s = pc.iceConnectionState;
                            if (s === "connected" || s === "completed") onLive();
                            if (s === "failed") showEnded();
                        };
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        sigSend({ type: "rtc_offer", sdp: offer.sdp });
                        break;
                    case "rtc_answer":
                        if (pc) pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)).catch(() => {});
                        break;
                    case "rtc_candidate":
                        if (pc && msg.candidate) {
                            const c = typeof msg.candidate === "string" ? { candidate: msg.candidate } : msg.candidate;
                            pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
                        }
                        break;
                }
            };
            sigWs.onclose = () => showEnded();
            sigWs.onerror = () => showEnded();
        }
        function onLive() {
            hideConnecting();
            streamEl.classList.add("visible");
            streamEl.play().catch(() => {});
            startAmbient();
            audioOverlay.classList.add("visible");
            audioOverlay.addEventListener("click", () => {
                streamEl.muted = false;
                streamEl.play().catch(() => {});
                audioOverlay.classList.remove("visible");
            }, { once: true });
        }
        function showEnded() {
            hideConnecting();
            streamEl.classList.remove("visible");
            stopAmbient();
            endedOverlay.classList.add("visible");
            if (pc) pc.close();
        }
        function setupCursorHandling(dc) {
            const MIMEMAP = { 0: "image/x-icon", 1: "image/jpeg", 2: "image/png", 3: "image/gif" };
            let currentCursorUrl = null;
            dc.onmessage = (e) => {
                if (!(e.data instanceof ArrayBuffer)) return;
                const v = new DataView(e.data);
                if (v.byteLength > 4 && v.getUint8(0) === 163 && v.getUint8(1) === 6) {
                    if (v.byteLength <= 32) {
                        streamEl.style.cursor = "none";
                        if (currentCursorUrl) { URL.revokeObjectURL(currentCursorUrl); currentCursorUrl = null; }
                    } else {
                        const mimeType = MIMEMAP[v.getUint8(2)] || "image/png";
                        const hotX = v.getUint8(3), hotY = v.getUint8(4);
                        const blob = new Blob([e.data.slice(5)], { type: mimeType });
                        if (currentCursorUrl) URL.revokeObjectURL(currentCursorUrl);
                        currentCursorUrl = URL.createObjectURL(blob);
                        streamEl.style.cursor = `url(${currentCursorUrl}) ${hotX} ${hotY}, default`;
                        if (document.pointerLockElement === streamEl) document.exitPointerLock();
                    }
                }
            };
        }
        let streamFocused = false;
        let pointerLocked = false;
        let vMouseX = 0, vMouseY = 0;
        let curX = 0, curY = 0;
        let mouseButtons = 0;
        const activeKeys = new Set();
        let escHoldTimer = null;
        function getVideoRect() {
            const rect = streamEl.getBoundingClientRect();
            const vw   = streamEl.videoWidth  || rect.width;
            const vh   = streamEl.videoHeight || rect.height;
            const scale = Math.min(rect.width / vw, rect.height / vh);
            const rw = vw * scale, rh = vh * scale;
            return {
                left:   rect.left + (rect.width  - rw) / 2,
                top:    rect.top  + (rect.height - rh) / 2,
                width:  rw,
                height: rh,
            };
        }
        document.addEventListener("pointerlockchange", () => {
            pointerLocked = document.pointerLockElement === streamEl;
            if (pointerLocked) {
                const r = getVideoRect();
                vMouseX = curX - r.left;
                vMouseY = curY - r.top;
            } else {
                navigator.keyboard?.unlock?.();
            }
        });
        streamEl.addEventListener("click", () => {
            if (!_dc) return;
            streamFocused = true;
            navigator.keyboard?.lock?.().catch(() => {});
        });
        document.addEventListener("click", (e) => {
            if (streamFocused && !streamEl.contains(e.target)) {
                streamFocused = false;
                navigator.keyboard?.unlock?.();
            }
        });
        document.addEventListener("mousemove", (e) => {
            if (streamFocused && _dc) {
                const moveX = e.movementX || 0;
                const moveY = e.movementY || 0;
                if (pointerLocked) {
                    const r = getVideoRect();
                    vMouseX = Math.max(0, Math.min(r.width,  vMouseX + moveX));
                    vMouseY = Math.max(0, Math.min(r.height, vMouseY + moveY));
                    curX = r.left + vMouseX;
                    curY = r.top  + vMouseY;
                } else {
                    curX = e.clientX;
                    curY = e.clientY;
                }
                sendMouse(moveX, moveY, 0);
            } else {
                curX = e.clientX;
                curY = e.clientY;
            }
        });
        document.addEventListener("mousedown", (e) => {
            if (!streamFocused || !_dc) return;
            if (streamEl.style.cursor === "none" && !pointerLocked) {
                streamEl.requestPointerLock().catch(() => {});
            }
            mouseButtons = e.buttons;
            sendMouse(0, 0, 0);
        });
        document.addEventListener("mouseup", (e) => {
            if (!streamFocused || !_dc) return;
            mouseButtons = e.buttons;
            sendMouse(0, 0, 0);
        });
        document.addEventListener("contextmenu", (e) => { if (streamFocused) e.preventDefault(); });
        streamEl.addEventListener("wheel", (e) => {
            if (!streamFocused) return;
            e.preventDefault();
            sendMouse(0, 0, e.deltaY > 0 ? -1 : 1);
        }, { passive: false });
        document.addEventListener("keydown", (e) => {
            if (!streamFocused || !_dc) return;
            e.preventDefault();
            e.stopPropagation();
            if (e.repeat) return;
            if (e.keyCode === 27 && !escHoldTimer) {
                escHoldTimer = setTimeout(() => {
                    if (document.pointerLockElement) document.exitPointerLock();
                    streamFocused = false;
                    escHoldTimer = null;
                }, 1200);
            }
            sendKey(e.keyCode, true);
        }, { capture: true });
        document.addEventListener("keyup", (e) => {
            if (!streamFocused || !_dc) return;
            e.preventDefault();
            e.stopPropagation();
            if (e.keyCode === 27) { clearTimeout(escHoldTimer); escHoldTimer = null; }
            sendKey(e.keyCode, false);
        }, { capture: true });
        function sendKey(keyCode, isDown) {
            if (isDown) activeKeys.add(keyCode); else activeKeys.delete(keyCode);
            const buf = new ArrayBuffer(24), v = new DataView(buf);
            v.setUint8(0, 1); v.setUint8(2, 1); v.setUint8(3, 1);
            v.setUint16(4, keyCode); v.setUint8(6, isDown ? 1 : 0);
            let offset = 7;
            for (const k of activeKeys) {
                if (k !== keyCode && k > 0 && k < 255 && offset < 21) {
                    v.setUint16(offset, k); offset += 2;
                    v.setUint8(offset, 1);  offset++;
                }
            }
            v.setUint8(offset++, 255);
            v.setUint8(1, offset - 1);
            dcSend(buf.slice(0, offset));
        }
        function sendMouse(moveX = 0, moveY = 0, scroll = 0) {
            moveX = Math.max(-127, Math.min(127, moveX));
            moveY = Math.max(-127, Math.min(127, moveY));
            const r    = getVideoRect();
            const absX = Math.floor(((curX - r.left) / r.width)  * 10000);
            const absY = Math.floor(((curY - r.top)  / r.height) * 10000);
            const buf  = new ArrayBuffer(12), v = new DataView(buf);
            v.setUint8(0, 1); v.setUint8(1, 11); v.setUint8(2, 2); v.setUint8(3, 8);
            v.setUint16(4, Math.max(0, Math.min(10000, absX)));
            v.setUint16(6, Math.max(0, Math.min(10000, absY)));
            v.setInt8(8, moveX); v.setInt8(9, moveY);
            v.setUint8(10, mouseButtons); v.setInt8(11, scroll);
            dcSend(buf);
        }
        const GAMEPAD_BTN_MASK = [4096, 8192, 16384, 32768, 256, 512, 0, 0, 32, 16, 64, 128, 1, 2, 4, 8, 0];
        function sendGamepad() {
            const gamepads = navigator.getGamepads?.() || [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;
                let mask = 0, lt = 0, rt = 0;
                for (let b = 0; b < Math.min(gp.buttons.length, 17); b++) {
                    const btn     = gp.buttons[b];
                    const pressed = typeof btn === "object" ? btn.pressed : btn > 0;
                    const value   = typeof btn === "object" ? btn.value  : btn;
                    if (pressed) {
                        if (b === 6) lt = Math.round(value * 255);
                        else if (b === 7) rt = Math.round(value * 255);
                        else mask |= GAMEPAD_BTN_MASK[b];
                    }
                }
                const ax = gp.axes;
                const lx = ax[0] ? Math.round(32767 * ax[0]) : 0;
                const ly = ax[1] ? Math.round(-32767 * ax[1]) : 0;
                const rx = ax[2] ? Math.round(32767 * ax[2]) : 0;
                const ry = ax[3] ? Math.round(-32767 * ax[3]) : 0;
                const buf = new ArrayBuffer(17), v = new DataView(buf);
                v.setUint8(0, 1); v.setUint8(1, 16); v.setUint8(2, 3); v.setUint8(3, 2); v.setUint8(4, i);
                v.setUint16(5, mask); v.setUint8(7, lt); v.setUint8(8, rt);
                v.setInt16(9, lx); v.setInt16(11, ly); v.setInt16(13, rx); v.setInt16(15, ry);
                dcSend(buf);
            }
        }
        function dcSend(buf) {
            if (_dc && _dc.readyState === "open") _dc.send(buf);
        }
        function inputLoop() {
            if (_dc && _dc.readyState === "open") sendGamepad();
            requestAnimationFrame(inputLoop);
        }
        requestAnimationFrame(inputLoop);
        window.addEventListener("beforeunload", (e) => {
            if (streamFocused) { e.preventDefault(); e.returnValue = ""; }
        });
        (async () => {
            const params = new URLSearchParams(location.search);
            const id     = params.get('id');
            const host   = params.get('host');
            if (!id) return;
            try {
                const res  = await fetch(`/cloud/v1/embed-data?id=${encodeURIComponent(id)}`);
                const data = await res.json();
                if (host && data.signaling_ws) {
                    data.signaling_ws = data.signaling_ws.replace(/wss?:\/\/[^/]+/, `wss://${host}`);
                }
                if (!res.ok) {
                    endedOverlay.querySelector("span").textContent = data.error || "session unavailable";
                    endedOverlay.classList.add("visible");
                    hideConnecting();
                    return;
                }
                await setupWebRTC(data.ice_servers, data.signaling_ws);
            } catch (e) {
                endedOverlay.querySelector("span").textContent = "connection failed";
                endedOverlay.classList.add("visible");
                hideConnecting();
            }
        })();
    </script>
